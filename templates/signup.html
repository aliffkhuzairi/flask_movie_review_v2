<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
    <title>Sign Up</title>
</head>
<body>
     <div class="auth-shell">
         <div class="auth-card">
             <h1>Create Account</h1>

             <div class="flash-container">
                 {% with messages = get_flashed_messages(with_categories=true) %}
                    {% if messages %}
                        {% for category, msg in messages %}
                            <div class="flash {{ category }}">{{ msg }}</div>
                        {% endfor %}
                    {% endif %}
                 {% endwith %}
             </div>

             <form action="{{ url_for('auth.signup') }}" method="POST" class="form-grid">

                <label for="id">ID:</label>
                <input id="id" type="text" name="user_id" required>

                <label for="password">Password:</label>
                <input id="password" type="password" name="password" required>

                <div class="button-row">
                    <button type="submit" class="button-link primary">Sign Up</button>
                </div>

             </form>

             <p class="small-text">
                Already have an account?
                <a href="{{ url_for('auth.index') }}" class="auth-option">Sign in</a>
             </p>
         </div>
    </div>
</body>
</html>

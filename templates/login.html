<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
    <title>Sign In</title>
</head>
<body>

    <div class="auth-shell">
         <div class="auth-card">

             <h1>Sign In</h1>

             <div class="flash-container">
                 {% with messages = get_flashed_messages(with_categories=true) %}
                    {% if messages %}
                        {% for category, msg in messages %}
                            <div class="flash {{ category }}">{{ msg }}</div>
                        {% endfor %}
                    {% endif %}
                 {% endwith %}
             </div>

             <form action="{{ url_for('auth.auth') }}" method="POST" class="form-grid auth-form">
                 <label for="id">ID:</label>
                 <input id="id" type="text" name="user_id" required>

                 <label for="password">Password:</label>
                 <input id="password" type="password" name="password" required>

                 <div class="button-row">
                     <button type="submit" class="button-link primary">Sign In</button>
                 </div>
             </form>

            <p class="small-text">
                Don't have an account?
                <a href="{{ url_for('auth.signup_page') }}" class="auth-option">Sign Up</a>
            </p>
         </div>
    </div>


</body>
</html>
